name: Lecture note checks

on:
  push:
    branches: [main]
    paths:
      - "lecture-note-on-probability-and-statistics/**"
      - ".github/workflows/lecture-note-checks.yml"
  pull_request:
    paths:
      - "lecture-note-on-probability-and-statistics/**"
      - ".github/workflows/lecture-note-checks.yml"

jobs:
  notes:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lecture-note-on-probability-and-statistics
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 講義ノートの整合性チェック
        run: python tools/check_notes.py

      - name: 内部リンク検査（lychee）
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--offline --include-fragments lecture-note-on-probability-and-statistics/index.html lecture-note-on-probability-and-statistics/notes/**/*.html"
          fail: true
